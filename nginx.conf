# =============================================================================
# nginx.conf – Wahl-O-Mat Bad Vilbel & Wetteraukreis 2026
# Statisches File-Bundle: index.html + style.css + data.js + app.js
# Funktioniert als root-Pfad UND als Unterverzeichnis
# =============================================================================

# Als eigenständiger Server:
# nginx -c /path/to/nginx.conf

# Als include in bestehender nginx-Installation:
# include /path/to/wahlomat.conf;

# -----------------------------------------------------------------------------
# Hauptkonfiguration (standalone)
# -----------------------------------------------------------------------------

worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # MIME-Types
    include       mime.types;
    default_type  application/octet-stream;

    # Explizite MIME-Types für JavaScript (wichtig für ES-Module)
    types {
        text/html                   html htm;
        text/css                    css;
        text/javascript             js mjs;
        application/json            json;
        image/svg+xml               svg svgz;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        image/webp                  webp;
        image/x-icon                ico;
        font/woff2                  woff2;
        font/woff                   woff;
    }

    # Logging
    access_log  /var/log/nginx/wahlomat_access.log;
    error_log   /var/log/nginx/wahlomat_error.log;

    # Gzip-Kompression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_buffers    16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Security Headers
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         SAMEORIGIN always;
    add_header Referrer-Policy         strict-origin-when-cross-origin always;

    # ==========================================================================
    # Server: Als root-Pfad hosten (http://example.com/)
    # ==========================================================================
    server {
        listen       80;
        server_name  localhost;

        root /var/www/wahlomat;  # <-- Pfad zum Datei-Bundle anpassen
        index index.html;

        # HTML – kein Cache
        location ~* \.html$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # JS + CSS – 1 Jahr Cache (mit Fingerprinting ideal, hier ohne)
        location ~* \.(css|js)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Bilder + Fonts
        location ~* \.(png|jpg|jpeg|webp|ico|svg|woff2|woff)$ {
            add_header Cache-Control "public, max-age=31536000";
        }

        # Alle anderen Requests → index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Fehlerseiten
        error_page 404 /index.html;
    }

    # ==========================================================================
    # Server: Als Unterverzeichnis hosten (http://example.com/wahlomat/)
    # ==========================================================================
    #
    # Variante B – in bestehenden Server als location einbetten:
    #
    # location /wahlomat/ {
    #     alias /var/www/wahlomat/;
    #     index index.html;
    #
    #     # HTML kein Cache
    #     location ~* \.html$ {
    #         add_header Cache-Control "no-store, no-cache, must-revalidate";
    #     }
    #
    #     # JS + CSS 1 Jahr
    #     location ~* \.(css|js)$ {
    #         add_header Cache-Control "public, max-age=31536000, immutable";
    #     }
    #
    #     try_files $uri $uri/ /wahlomat/index.html;
    # }

}
